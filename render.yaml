services:
  - type: cron
    name: nexus-price-worker
    runtime: node
    plan: starter
    schedule: "0 8 1 1 *"
    buildCommand: "npm install"
    startCommand: "npm run worker:refresh"
    envVars:
      - key: NEXUS_BLOBS_SITE_ID
        sync: false
      - key: NEXUS_BLOBS_TOKEN
        sync: false
      - key: WORKER_BATCH_SIZE
        value: "1"
      - key: WORKER_REQUEST_DELAY_MS
        value: "1200"
      - key: WORKER_OWN_STORE_DELAY_MS
        value: "1200"
      - key: WORKER_ITEM_RETRIES
        value: "3"
      - key: WORKER_FETCH_RETRIES
        value: "5"
      - key: WORKER_SAVE_EVERY
        value: "5"
      - key: CATALOG_CANDIDATE_LIMIT
        value: "5"
