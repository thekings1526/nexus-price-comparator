[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/refresh-prices"
  to = "/.netlify/functions/refresh-prices"
  status = 200

[[redirects]]
  from = "/api/trigger-refresh"
  to = "/.netlify/functions/trigger-render-refresh"
  status = 200

[[redirects]]
  from = "/api/refresh-control"
  to = "/.netlify/functions/refresh-control"
  status = 200

[[redirects]]
  from = "/api/review-decision"
  to = "/.netlify/functions/review-decision"
  status = 200

[[redirects]]
  from = "/api/review-candidates"
  to = "/.netlify/functions/review-candidates"
  status = 200
